<div class="admin-container">
  <h1>🛠 Admin panel</h1>

  <div class="section">
    <h2>Books</h2>
    <div *ngFor="let book of books" class="row">
      <span>{{ book.title }}</span>
      <button class="delete" (click)="deleteBook(book.id)">Delete</button>
    </div>
  </div>

  <div class="section">
    <h2>Users</h2>
    <div *ngFor="let user of users" class="row">
      <span>{{ user.username }} ({{ user.email }})</span>
      <button class="block" (click)="blockUser(user.id)">Block</button>
    </div>
  </div>
</div>
